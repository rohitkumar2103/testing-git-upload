<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Student Registration Form</h2>

    <form>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div class="radio-group">
                <label><input type="radio" name="gender"> Male</label>
                <label><input type="radio" name="gender"> Female</label>
                <label><input type="radio" name="gender"> Other</label>
            </div>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" required>
        </div>

        <!-- State Dropdown -->
        <div class="form-group">
            <label>State</label>
            <select id="state" required onchange="updateDistricts()">
                <option value="">Select State</option>
                <option value="UP">Uttar Pradesh</option>
                <option value="Delhi">Delhi</option>
                <option value="Haryana">Haryana</option>
                <option value="Maharashtra">Maharashtra</option>
                <option value="Rajasthan">Rajasthan</option>
            </select>
        </div>

        <!-- District Dropdown -->
        <div class="form-group">
            <label>District</label>
            <select id="district" required>
                <option value="">Select District</option>
            </select>
        </div>

        <div class="form-group">
            <label>Course</label>
            <select>
                <option>Select Course</option>
                <option>BCA</option>
                <option>BBA</option>
                <option>B.Tech</option>
                <option>MCA</option>
            </select>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea placeholder="Enter your address"></textarea>
        </div>

        <button type="submit">Register</button>
    </form>
</div>

<script>
function updateDistricts() {
    const state = document.getElementById("state").value;
    const district = document.getElementById("district");

    let districts = [];

    if (state === "UP") {
        districts = ["Gautam Buddha Nagar", "Ghaziabad", "Meerut", "Lucknow", "Kanpur"];
    } else if (state === "Delhi") {
        districts = ["New Delhi", "North Delhi", "South Delhi"];
    } else if (state === "Haryana") {
        districts = ["Gurgaon", "Faridabad", "Panipat"];
    } else if (state === "Maharashtra") {
        districts = ["Mumbai", "Pune", "Nagpur"];
    } else if (state === "Rajasthan") {
        districts = ["Jaipur", "Udaipur", "Jodhpur"];
    }

    // Clear previous options
    district.innerHTML = '<option value="">Select District</option>';

    // Add new options
    districts.forEach(function(d) {
        let option = document.createElement("option");
        option.value = d;
        option.text = d;
        district.appendChild(option);
    });
}
</script>

</body>
</html>
