<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2 id="form-title">Student Registration Form</h2>

    <form action="/submit-form" method="post" id="registrationForm">
        <div class="form-group">
            <label for="fullname">Full Name</label>
            <input id="fullname" type="text" name="fullname" placeholder="e.g., John Doe" required>
        </div>

        <div class="form-group">
            <label for="email">Email Id</label>
            <input id="email" type="email" name="email" placeholder="e.g., john@example.com" required title="Please enter a valid email address">
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input id="phone" type="tel" name="phone" placeholder="e.g., 9876543210" pattern="[0-9]{10}" required title="Please enter a valid 10-digit phone number">
        </div>

        <div class="form-group">
            <label for="pincode">Pin Code</label>
            <input id="pincode" type="text" name="pincode"
                   placeholder="Please Enter 6-digit pin code" 
                   maxlength="6" 
                   pattern="[0-9]{6}" 
                   inputmode="numeric"
                   required
                   title="Please enter a valid 6-digit pin code">
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="Male" required> Male</label>
                <label><input type="radio" name="gender" value="Female" required> Female</label>
                <label><input type="radio" name="gender" value="Other" required> Other</label>
            </div>
        </div>

        <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input id="dob" type="date" name="dob" required>
        </div>

        <div class="form-group">
            <label for="state">State</label>
            <select id="state" name="state" required onchange="updateDistricts()">
                <option value="">Select State</option>
                <option value="UP">Uttar Pradesh</option>
                <option value="Delhi">Delhi</option>
                <option value="Haryana">Haryana</option>
                <option value="Maharashtra">Maharashtra</option>
                <option value="Rajasthan">Rajasthan</option>
            </select>
        </div>

        <div class="form-group">
            <label for="district">District</label>
            <select id="district" name="district" required>
                <option value="">Select District</option>
            </select>
        </div>

        <div class="form-group">
            <label for="course">Course</label>
            <select id="course" name="course" required>
                <option value="">Select Course</option>
                <option value="BCA">BCA</option>
                <option value="BBA">BBA</option>
                <option value="B.Tech">B.Tech</option>
                <option value="MCA">MCA</option>
                <option value="M.COM">M.COM</option>
            </select>
        </div>

        <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" name="address" placeholder="Enter your complete address" rows="4" required></textarea>
        </div>

        <div class="button-group">
            <button type="submit">Register</button>
            <button type="reset">Clear</button>
        </div>
    </form>
</div>

<script>
function updateDistricts() {
    const state = document.getElementById("state").value;
    const district = document.getElementById("district");

    let districts = [];

    if (state === "UP") {
        districts = ["Gautam Buddha Nagar", "Ghaziabad", "Meerut", "Lucknow", "Kanpur"];
    } else if (state === "Delhi") {
        districts = ["New Delhi", "North Delhi", "South Delhi"];
    } else if (state === "Haryana") {
        districts = ["Gurgaon", "Faridabad", "Panipat"];
    } else if (state === "Maharashtra") {
        districts = ["Mumbai", "Pune", "Nagpur"];
    } else if (state === "Rajasthan") {
        districts = ["Jaipur", "Udaipur", "Jodhpur"];
    }

    district.innerHTML = '<option value="">Select District</option>';

    districts.forEach(function(d) {
        let option = document.createElement("option");
        option.value = d;
        option.text = d;
        district.appendChild(option);
    });
}

// Form validation
document.getElementById("registrationForm").addEventListener("submit", function(event) {
    const fullname = document.getElementById("fullname").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const pincode = document.getElementById("pincode").value.trim();
    const dob = document.getElementById("dob").value;
    const state = document.getElementById("state").value;
    const district = document.getElementById("district").value;
    const course = document.getElementById("course").value;
    const address = document.getElementById("address").value.trim();

    if (!fullname || !email || !phone || !pincode || !dob || !state || !district || !course || !address) {
        event.preventDefault();
        alert("Please fill in all required fields.");
        return false;
    }

    if (phone.length !== 10 || isNaN(phone)) {
        event.preventDefault();
        alert("Phone number must be exactly 10 digits.");
        return false;
    }

    if (pincode.length !== 6 || isNaN(pincode)) {
        event.preventDefault();
        alert("Pin code must be exactly 6 digits.");
        return false;
    }

    alert("Form submitted successfully!");
});
</script>

</body>
</html>
